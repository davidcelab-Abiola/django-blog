{% extends "blog/base.html" %}
{% load static %}

{% block content %}
<div class="profile-container">
    <div class="profile-card">

        <h2 class="text-center mb-4">My Profile</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Profile Picture Upload -->
            <div class="text-center mb-4">
                {% if user.profile.image %}
                    <img src="{{ user.profile.image.url }}" alt="Profile" class="profile-avatar mb-3">
                {% else %}
                    <div class="profile-avatar-placeholder mb-3">👤</div>
                {% endif %}

                <label class="custom-file-upload">
                    📸 Choose Profile Picture
                    <input type="file" name="image" accept="image/*">
                </label>
            </div>

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" value="{{ user.username }}">
            </div>

            <!-- Email -->
            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" value="{{ user.email }}">
            </div>

            <button type="submit" class="btn btn-post w-100 mb-3">
                 Save Changes
            </button>
        </form>

        <div class="text-center">
            <a href="{% url 'password_reset' %}" class="btn btn-outline-light">
                 Change Password
            </a>
        </div>

    </div>
</div>
{% endblock %}
