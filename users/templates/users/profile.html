{% extends "blog/base.html" %}
{% load static %}

{% block content %}
<div class="profile-container">
    <div class="profile-card">

        <h2 class="text-center mb-4">My Profile</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Profile Picture -->
            <div class="text-center mb-4">
                {% if user.profile.image %}
                    <img src="{{ user.profile.image.url }}" alt="Profile" class="profile-avatar">
                {% else %}
                    <div class="profile-avatar-placeholder">User</div>
                {% endif %}

                <div class="mt-3">
                    <label class="custom-file-upload">
                        Change Profile Picture
                        {{ p_form.image }}
                    </label>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Username</label>
                    {{ u_form.username }}
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email Address</label>
                    {{ u_form.email }}
                </div>
            </div>

            <button type="submit" class="btn btn-post w-100 mb-3">
                Save Changes
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="{% url 'password_reset' %}" class="btn btn-outline-light">
                Change Password
            </a>
        </div>

    </div>
</div>
{% endblock %}
