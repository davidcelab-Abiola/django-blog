{% extends "blog/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="content-section p-4 border rounded">
    <form method="POST">
        {% csrf_token %}
        <fieldset>
            <legend class="mb-4">reset password</legend>
            {{ form|crispy }}
        </fieldset>

        <button class="btn btn-primary mt-3" type="submit">request password reset</button>
    </form>
</div>
{% endblock %}
